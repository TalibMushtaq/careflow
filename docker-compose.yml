version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: careflow_db_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: careflow_db
      MYSQL_USER: careflow_user
      MYSQL_PASSWORD: careflow_password
    ports:
      - "${DB_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: careflow_backend_container
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=careflow_db
      - DB_USER=careflow_user
      - DB_PASSWORD=careflow_password
      - DATABASE_URL=mysql+pymysql://careflow_user:careflow_password@db:3306/careflow_db
      - SECRET_KEY=careflow-dev-secret-key-3n9x8m
      - JWT_SECRET_KEY=careflow-jwt-dev-secret-key-a1b2c3
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: careflow_frontend_container
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  mysql_data:
